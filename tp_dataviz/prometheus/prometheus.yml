global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/recording.yml
  - /etc/prometheus/rules/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: node_exporter_host
    static_configs:
      - targets: ['node-exporter-host:9100']

  - job_name: node_exporter_node2
    static_configs:
      - targets: ['node-exporter-node2:9100']

  - job_name: mysqld_exporter
    static_configs:
      - targets: ['mysqld-exporter:9104']

  - job_name: demo_app
    metrics_path: /metrics
    static_configs:
      - targets: ['demo-app:8080']